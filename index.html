  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

:var(--tx);font-family:var(--sa);overflow-x:hidden;-webkit-text-size-adjust:100%;-webkit-tap-highlight-color:transparent}\nbody::before{content:none}\nbody::after{content:none}\n#bg-canvas{display:none}\n\n.wrap{max-width:1140px;margin:0 auto;padding:1.6rem 1.4rem 3rem;position:relative;z-index:1}\n\n/* \u2500\u2500 TOPBAR \u2500\u2500 */\n.topbar{display:flex;align-items:center;justify-content:space-between;padding-bottom:1.1rem;border-bottom:1px solid var(--g1);margin-bottom:1.4rem}\n.logo{display:flex;align-items:baseline;gap:.55rem}\n.logo-mark{font-family:var(--sa);font-size:1.18rem;font-weight:700;color:var(--tx);letter-spacing:-.02em}\n.logo-sep{color:var(--g2)}\n.logo-tag{font-size:.74rem;color:var(--mu);letter-spacing:.02em}\n.topbar-r{display:flex;align-items:center;gap:.8rem}\n.badge{display:inline-flex;align-items:center;gap:.45rem;font-size:.74rem;font-weight:500;padding:.3rem .75rem;border-radius:999px;border:1px solid var(--g1);color:var(--mu);background:#fff;transition:all .2s}\n.badge.conn{color:var(--gr);border-color:rgba(22,163,74,.3);background:var(--grd)}\n.badge.err{color:var(--re);border-color:rgba(220,38,38,.3);background:rgba(220,38,38,.06)}\n.dot{width:7px;height:7px;border-radius:50%;background:currentColor;position:relative}\n.dot::after{content:none}\n.spd-ticker{display:none;align-items:baseline;gap:.25rem;font-family:var(--mo)}\n.spd-ticker.on{display:inline-flex}\n.spd-n{font-size:.86rem;font-weight:600;color:var(--c)}\n.spd-u{font-size:.66rem;color:var(--mu)}\n\n/* \u2500\u2500 MAIN GRID \u2500\u2500 */\n.grid{display:grid;grid-template-columns:1fr 336px;gap:1.1rem;align-items:start}\n.left,.right{display:flex;flex-direction:column;gap:1.1rem}\n\n/* \u2500\u2500 CARD \u2500\u2500 */\n.card{background:#fff;border:1px solid var(--g1);border-radius:12px;padding:1.25rem 1.35rem;box-shadow:0 1px 2px rgba(16,24,40,.04)}\n.card::before{content:none}\n.clabel{font-size:.7rem;letter-spacing:.08em;text-transform:uppercase;color:var(--mu);margin-bottom:1rem;font-weight:600}\n\n/* \u2500\u2500 SPEED DISPLAY BAR \u2500\u2500 */\n.sp-bar{display:flex;align-items:center;justify-content:space-between;padding:.9rem 1.25rem;background:#fff;border:1px solid var(--g1);border-radius:12px;opacity:0;transition:opacity .3s;pointer-events:none;box-shadow:0 1px 2px rgba(16,24,40,.04)}\n.sp-bar.on{opacity:1;pointer-events:auto}\n.sp-lbl{font-size:.7rem;letter-spacing:.08em;text-transform:uppercase;color:var(--mu);font-weight:600}\n.sp-meta{display:flex;align-items:baseline;gap:.4rem}\n.sp-num{font-family:var(--mo);font-size:2rem;font-weight:600;color:var(--c);line-height:1;min-width:5ch;transition:color .3s}\n.sp-unit{font-size:.74rem;color:var(--mu)}\n.sp-pulse{display:none}\n.sp-bar.on .sp-pulse{display:none}\n.eta-wrap{text-align:right}\n.eta-lbl{font-size:.66rem;letter-spacing:.06em;text-transform:uppercase;color:var(--mu)}\n.eta-val{font-family:var(--mo);font-size:.95rem;font-weight:600;color:var(--tx)}\n\n/* \u2500\u2500 YOUR ID \u2500\u2500 */\n.id-box{display:flex;align-items:center;gap:.9rem;padding:.85rem 1.1rem;background:var(--cd);border:1px solid var(--cg);border-radius:10px}\n.id-val{font-family:var(--mo);font-size:1.7rem;font-weight:600;letter-spacing:.18em;color:var(--c);flex:1}\n.id-val.loading{font-size:.95rem;font-weight:400;color:var(--mu);letter-spacing:.02em;animation:none}\n.qr-box{display:flex;justify-content:center;padding:.9rem;background:#fff;border:1px solid var(--g1);border-radius:10px;margin-top:.85rem;width:fit-content}\n.nick-inp{margin-top:.7rem;font-size:.78rem;padding:.5rem .85rem;width:100%}\n\n/* \u2500\u2500 CONNECT AREA \u2500\u2500 */\n.connect-area{margin-top:1.1rem;padding-top:1.1rem;border-top:1px solid var(--g1)}\n.connect-lbl{font-size:.8rem;color:var(--tx);margin-bottom:.6rem;font-weight:500}\n.row{display:flex;gap:.6rem}\n.recent-row{display:flex;gap:.45rem;margin-top:.65rem;flex-wrap:wrap}\n.chip{font-family:var(--mo);font-size:.68rem;padding:.32rem .7rem;border:1px solid var(--g1);background:#fff;border-radius:999px;color:var(--mu);cursor:pointer;transition:all .15s}\n.chip:hover{border-color:var(--c);color:var(--c)}\n\n/* \u2500\u2500 INPUTS / BUTTONS \u2500\u2500 */\n.inp,.cinp{flex:1;font-family:var(--sa);font-size:.85rem;padding:.55rem .85rem;background:#fff;border:1px solid var(--g2);border-radius:8px;color:var(--tx);outline:none;transition:border-color .15s,box-shadow .15s}\n.inp::placeholder,.cinp::placeholder{color:#98a2b3}\n.inp:focus,.cinp:focus{border-color:var(--c);box-shadow:0 0 0 3px var(--cd)}\n.cinp:disabled,.inp:disabled{background:var(--dm);color:var(--mu);cursor:not-allowed}\n.btn{font-family:var(--sa);font-size:.82rem;font-weight:600;padding:.55rem 1rem;border-radius:8px;border:1px solid var(--g2);background:#fff;color:var(--tx);cursor:pointer;transition:all .15s;white-space:nowrap}\n.btn:hover{border-color:var(--g2);background:var(--dm)}\n.btn:active{transform:translateY(1px)}\n.btn-p{background:var(--c);border-color:var(--c);color:#fff}\n.btn-p:hover{background:#1d4ed8;border-color:#1d4ed8}\n.btn-p:disabled{background:var(--dm);color:var(--mu);border-color:var(--g1);cursor:not-allowed;transform:none}\n.btn-p.connected,.btn-p.connected:hover{background:var(--gr);border-color:var(--gr);color:#fff;cursor:default;transform:none}\n.btn-sm{font-size:.72rem;padding:.32rem .65rem;border-radius:7px}\n\n/* \u2500\u2500 DROP ZONE \u2500\u2500 */\n.dz{border:2px dashed var(--g2);border-radius:10px;padding:2.3rem 1.5rem;text-align:center;cursor:pointer;transition:all .2s;background:#fff}\n.dz::before{content:none}\n.dz::after{content:none}\n.dz:hover,.dz.over{border-color:var(--c);background:var(--cd)}\n.dz:hover::before,.dz.over::before{content:none}\n.dz.off{opacity:.45;pointer-events:none}\n.dz-ico{width:52px;height:52px;border-radius:10px;background:var(--cd);display:flex;align-items:center;justify-content:center;margin:0 auto .8rem;font-size:1.5rem;color:var(--c)}\n.dz-ico::before{content:none}\n.dz-h{font-size:.9rem;font-weight:600;color:var(--tx);margin-bottom:.25rem}\n.dz-s{font-size:.78rem;color:var(--mu);animation:none}\n\n/* \u2500\u2500 FILE QUEUE \u2500\u2500 */\n.qlist{display:flex;flex-direction:column;gap:.55rem;margin-top:.9rem}\n.qi{display:flex;align-items:center;gap:.8rem;background:#fff;border:1px solid var(--g1);border-radius:10px;padding:.65rem .85rem;transition:border-color .2s,opacity .3s}\n.qi.on{border-color:var(--cg);background:var(--cd)}\n.qi.on::after{content:none}\n.qi.done{opacity:.65}\n.qi-ico{font-size:1.05rem;width:32px;height:32px;border-radius:8px;background:var(--dm);display:flex;align-items:center;justify-content:center;flex-shrink:0}\n.qi-inf{flex:1;min-width:0}\n.qi-nm{font-size:.82rem;font-weight:500;color:var(--tx);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}\n.qi-mt{font-size:.7rem;color:var(--mu);margin:.1rem 0 .3rem}\n.qi-track{height:4px;background:var(--dm);border-radius:999px;overflow:hidden}\n.qi-fill{height:100%;width:0%;background:var(--c);border-radius:999px;transition:width .12s linear}\n.qi-fill::after{content:none}\n.qi.on .qi-fill{background:var(--c)}\n.qi-pct{font-family:var(--mo);font-size:.72rem;color:var(--mu);flex-shrink:0;min-width:3.2ch;text-align:right}\n.qi-pct.ok{color:var(--gr)}\n.qi-pct.er{color:var(--re)}\n.qi button{flex-shrink:0}\n\n/* \u2500\u2500 LOG \u2500\u2500 */\n.log{font-family:var(--mo);font-size:.72rem;line-height:1.85;color:var(--mu);max-height:96px;overflow-y:auto;background:#fafbfc;border:1px solid var(--g1);border-radius:8px;padding:.6rem .9rem}\n.log .ok{color:var(--gr)}\n.log .inf{color:var(--c)}\n.log .er{color:var(--re)}\n.log::-webkit-scrollbar{width:6px}\n.log::-webkit-scrollbar-thumb{background:var(--g2);border-radius:999px}\n\n/* \u2500\u2500 STATS \u2500\u2500 */\n.hrow{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem}\n.hrow .clabel{margin-bottom:0}\n.mstats{display:flex;gap:.55rem}\n.ms{flex:1;background:#fafbfc;border:1px solid var(--g1);border   <\u002Fdiv>\n          <div class=\"crow\">\n            <input class=\"cinp\" id=\"chat-input\" type=\"text\" placeholder=\"Message\u2026\" disabled=\"\" onkeydown=\"onChatKey(event)\">\n            <button class=\"btn btn-p btn-sm\" id=\"chat-send\" onclick=\"sendChat()\" disabled=\"\">\u2192<\u002Fbutton>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<script>\n/* \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\n   PARTICLE CANVAS\n\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550 */\nconst CVS = document.getElementById('bg-canvas');\nconst CX  = CVS.getContext('2d');\nconst COLS = ['rgba(0,212,255,','rgba(0,255,136,','rgba(181,107,255,'];\nlet pts = [];\nlet xferActive = false;\n\nfunction rsz(){ CVS.width = innerWidth; CVS.height = innerHeight; }\nrsz(); addEventListener('resize', rsz);\n\nfunction mkPt(startX){\n  const dir = Math.random() < .72 ? 1 : -1;\n  return {\n    x  : startX !== undefined ? startX : (dir > 0 ? -30 : CVS.width + 30),\n    y  : Math.random() * CVS.height,\n    vx : (Math.random() * 5 + 2.5) * dir,\n    r  : Math.random() * 1.3 + .3,\n    a  : Math.random() * .32 + .07,\n    tl : Math.random() * 55 + 18,\n    col: COLS[Math.random() < .65 ? 0 : Math.random() < .55 ? 2 : 1],\n  };\n}\n\nfor(let i=0;i<75;i++){ const p=mkPt(Math.random()*innerWidth); pts.push(p); }\n\nfunction frame(){\n  CX.clearRect(0,0,CVS.width,CVS.height);\n  const sp = xferActive ? 3.8 : 1;\n\n  if(Math.random() < (xferActive ? .45 : .07)) pts.push(mkPt());\n\n  pts = pts.filter(p => {\n    p.x += p.vx * sp;\n    const tx = p.x - Math.sign(p.vx) * p.tl * Math.min(sp, 2.6);\n    const g  = CX.createLinearGradient(p.x, p.y, tx, p.y);\n    g.addColorStop(0, p.col + p.a + ')');\n    g.addColorStop(1, p.col + '0)');\n    CX.beginPath(); CX.moveTo(p.x, p.y); CX.lineTo(tx, p.y);\n    CX.strokeStyle = g; CX.lineWidth = p.r; CX.stroke();\n    CX.beginPath(); CX.arc(p.x, p.y, p.r * 1.9, 0, 6.2832);\n    CX.fillStyle = p.col + (Math.min(p.a * 1.6, .6)) + ')'; CX.fill();\n    return p.x > -400 && p.x < CVS.width + 400;\n  });\n\n  if(pts.length > (xferActive ? 160 : 85)) pts.splice(0, pts.length - 85);\n  requestAnimationFrame(frame);\n}\nframe();\n\n/* \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\n   SPEED TRACKER\n\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550 */\nconst CHUNK = 256 * 1024;\nlet speedBytes=0, speedLast=0, speedTimer=null, curMBs=0, speedMode=null, speedPrev=0, speedEMA=0;\nlet sendGate=null, curSendAbort=false;\nconst STREAM_MIN=100*1024*1024;\nconst TAIL=1024*1024;\nlet partialMap={};\nlet qrMade=false;\nconst baseTitle=document.title;\nlet lastPeerId=null, autoRetry=null, retryN=0, reconActive=false, wasInterruptedSend=false;\nlet dataConn=null;\nconst RETRY_DELAYS=[2000,5000,10000,20000,30000];\n\nasync function sha256hex(buf){\n  const h=await crypto.subtle.digest('SHA-256',buf);\n  return [...new Uint8Array(h)].map(b=>b.toString(16).padStart(2,'0')).join('');\n}\nfunction idb(){\n  return new Promise((res,rej)=>{\n    const q=indexedDB.open('dropme',1);\n    q.onupgradeneeded=()=>q.result.createObjectStore('resume');\n    q.onsuccess=()=>res(q.result);\n    q.onerror=()=>rej(q.error);\n  });\n}\nasync function idbSet(k,v){ try{ const d=await idb(); await new Promise((res,rej)=>{ const t=d.transaction('resume','readwrite'); t.objectStore('resume').put(v,k); t.oncomplete=res; t.onerror=()=>rej(t.error); }); }catch(e){} }\nasync function idbGet(k){ try{ const d=await idb(); return await new Promise((res)=>{ const r=d.transaction('resume').objectStore('resume').get(k); r.onsuccess=()=>res(r.result); r.onerror=()=>res(null); }); }catch(e){ return null; } }\nasync function idbDel(k){ try{ const d=await idb(); d.transaction('resume','readwrite').objectStore('resume').delete(k); }catch(e){} }\n\nfunction chime(){\n  try{\n    const ctx=new (window.AudioContext||window.webkitAudioContext)();\n    const o=ctx.createOscillator(), g=ctx.createGain();\n    o.connect(g); g.connect(ctx.destination);\n    g.gain.value=0.04;\n    o.frequency.value=880;\n    o.start();\n    o.frequency.setValueAtTime(1320,ctx.currentTime+0.12);\n    o.stop(ctx.currentTime+0.25);\n  }catch(e){}\n}\nfunction notifyDone(text){\n  chime();\n  if(document.hidden){\n    try{ if(window.Notification&&Notification.permission==='granted') new Notification('drop.me',{body:text}); }catch(e){}\n    document.title='\\u2713 '+text;\n    const restore=()=>{ document.title=baseTitle; document.removeEventListener('visibilitychange',restore); };\n    document.addEventListener('visibilitychange',restore);\n  }\n}\nfunction askNotify(){\n  try{ if(window.Notification&&Notification.permission==='default') Notification.requestPermission(); }catch(e){}\n}\nfunction toggleQR(){\n  const box=document.getElementById('qr-box');\n  if(box.style.display==='none'){\n    if(!qrMade){\n      if(!window.QRCode){ addLog('QR library not loaded','er'); return; }\n      if(!peer||!peer.id){ addLog('peer not ready yet','er'); return; }\n      const url=location.origin+location.pathname+'#'+peer.id;\n      new QRCode(box,{text:url,width:148,height:148,colorDark:'#000000',colorLight:'#ffffff',correctLevel:QRCode.CorrectLevel.M});\n      qrMade=true;\n    }\n    box.style.display='flex';\n  } else {\n    box.style.display='none';\n  }\n}\nasync function shareLink(){\n  if(!peer||!peer.id){ addLog('peer not ready yet','er'); return; }\n  const url=location.origin+location.pathname+'#'+peer.id;\n  if(navigator.share){\n    try{\n      await navigator.share({title:'drop.me',text:'Connect to me on drop.me \\u2014 code '+peer.id,url:url});\n      return;\n    }catch(e){ if(e&&e.name==='AbortError') return; }\n  }\n  try{ await navigator.clipboard.writeText(url); addLog('link copied to clipboard','ok'); }\n  catch(e){ addLog(url,'inf'); }\n}\nasync function connQuality(){\n  try{\n    const pc=conn&&conn.peerConnection; if(!pc) return null;\n    const stats=await pc.getStats();\n    let pairId=null; const pairs={}, cands={};\n    stats.forEach(r=>{\n      if(r.type==='transport'&&r.selectedCandidatePairId) pairId=r.selectedCandidatePairId;\n      if(r.type==='candidate-pair') pairs[r.id]=r;\n      if(r.type==='local-candidate'||r.type==='remote-candidate') cands[r.id]=r;\n    });\n    let pair=pairId&&pairs[pairId];\n    if(!pair) pair=Object.values(pairs).find(p=>p.nominated&&p.state==='succeeded')||Object.values(pairs).find(p=>p.state==='succeeded');\n    if(!pair) return null;\n    const lc=cands[pair.localCandidateId], rc=cands[pair.remoteCandidateId];\n    const relay=(lc&&lc.candidateType==='relay')||(rc&&rc.candidateType==='relay');\n    return relay?'relayed':'direct';\n  }catch(e){ return null; }\n}\nfunction cancelReconnect(){\n  if(autoRetry){ clearTimeout(autoRetry); autoRetry=null; }\n  reconActive=false; retryN=0;\n}\nfunction scheduleReconnect(){\n  if(!lastPeerId||reconActive||sending) return;\n  reconActive=true; retryN=0;\n  const attempt=()=>{\n    autoRetry=null;\n    if(!reconActive) return;\n    if(conn&&conn.open){ cancelReconnect(); return; }\n    if(retryN>=RETRY_DELAYS.length){\n      cancelReconnect();\n      setBadge('disconnected','err');\n      addLog('auto-reconnect gave up \\u2014 connect manually','er');\n      return;\n    }\n    setBadge('reconnecting\\u2026','');\n    addLog('reconnect attempt '+(retryN+1)+'/'+RETRY_DELAYS.length+' \\u2192 '+lastPeerId,'inf');\n    try{\n      if(peer&&peer.disconnected) peer.reconnect();\n      conn=peer.connect(lastPeerId,{reliable:true});\n      wire();\n    }catch(e){ addLog('reconnect error: '+e.message,'er'); }\n    retryN++;\n    autoRetry=setTimeout(attempt,RETRY_DELAYS[Math.min(retryN,RETRY_DELAYS.length-1)]);\n  };\n  autoRetry=setTimeout(attempt,RETRY_DELAYS[0]);\n}\nfunction showRecvCard(name,size){\n  removeRecvCard();\n  const list=document.getElementById('queue-list');\n  const el=document.createElement('div');\n  el.className='qi on'; el.id='recv-card';\n  el.innerHTML=`\n    <div class=\"qi-ico\">\\u2b07<\u002Fdiv>\n    <div class=\"qi-inf\">\n      <div class=\"qi-nm\">${escH(name)}<\u002Fdiv>\n      <div class=\"qi-mt\">${fmt(size)} \\u00b7 incoming<\u002Fdiv>\n      <div class=\"qi-track\"><div class=\"qi-fill\" id=\"rc-fill\"><\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"qi-pct\" id=\"rc-pct\">0%<\u002Fdiv>`;\n  list.prepend(el);\n}\nfunction removeRecvCard(){ document.getElementById('recv-card')?.remove(); }\nfunction finishRecvCard(ok,label){\n  const el=document.getElementById('recv-card'); if(!el) return;\n  el.classList.remove('on'); if(ok) el.classList.add('done');\n  const p=document.getElementById('rc-pct');\n  if(p){ p.textContent=label; p.className='qi-pct '+(ok?'ok':'er'); }\n  if(ok){\n    const f=document.getElementById('rc-fill'); if(f) f.style.width='100%';\n    setTimeout(removeRecvCard,6000);\n  }\n}\nfunction lsGet(k){ try{ return localStorage.getItem(k); }catch(e){ return null; } }\nfunction lsSet(k,v){ try{ localStorage.setItem(k,v); }catch(e){} }\nfunction saveRecent(id,name){\n  let r=[]; try{ r=JSON.parse(lsGet('recent')||'[]'); }catch(e){}\n  r=r.filter(x=>x.id!==id);\n  r.unshift({id:id,name:name||null,ts:Date.now()});\n  r=r.slice(0,3);\n  lsSet('recent',JSON.stringify(r));\n  renderRecent();\n  try{\n    const bn=document.getElementById('browser-note');\n    if(bn){\n      if(window.showSaveFilePicker){\n        bn.classList.add('good');\n        bn.textContent='\\u2713 Large files (100 MB+) stream directly to disk in this browser \\u2014 no size limit.';\n      } else {\n        bn.textContent='Tip: for large files (100 MB+), use Chrome or Edge on desktop \\u2014 they stream to disk with no size limit. This browser holds files in memory (\\u22481\\u20132 GB max).';\n      }\n    }\n  }catch(e){}\n}\nfunction renderRecent(){\n  const row=document.getElementById('recent-row'); if(!row) return;\n  let r=[]; try{ r=JSON.parse(lsGet('recent')||'[]'); }catch(e){}\n  row.innerHTML='';\n  r.forEach(x=>{\n    const c=document.createElement('button');\n    c.className='chip';\n    c.textContent=(x.name?x.name+' \\u00b7 ':'')+x.id;\n    c.onclick=()=>quickConnect(x.id);\n    row.appendChild(c);\n  });\n}\nfunction quickConnect(id){\n  if(conn&&conn.open) return;\n  document.getElementById('peer-id-input').value=id;\n  connectToPeer();\n}\nfunction showTextDropBanner(txt){\n  const b=bannerShell();\n  const t=document.createElement('div'); t.className='ib-t'; t.textContent='send pasted text';\n  const n=document.createElement('div'); n.className='ib-n';\n  n.textContent=txt.length>90?txt.slice(0,90)+'\\u2026':txt;\n  const row=bRow();\n  row.appendChild(bBtn('Send ('+txt.length+' chars)','btn btn-p',()=>{\n    hideInBanner();\n    if(conn&&conn.open){\n      conn.send({type:'drop-text',text:txt.slice(0,200000)});\n      addLog('sent text snippet ('+txt.length+' chars)','ok');\n    }\n  }));\n  row.appendChild(bBtn('Cancel','btn btn-sm',hideInBanner));\n  b.appendChild(t); b.appendChild(n); b.appendChild(row);\n  document.body.appendChild(b);\n}\nfunction showTextRecvBanner(txt){\n  const b=bannerShell();\n  const t=document.createElement('div'); t.className='ib-t'; t.textContent='received text';\n  const n=document.createElement('div'); n.className='ib-n';\n  n.textContent=txt.length>120?txt.slice(0,120)+'\\u2026':txt;\n  const row=bRow();\n  row.appendChild(bBtn('Copy','btn btn-p',async()=>{\n    try{ await navigator.clipboard.writeText(txt); addLog('copied to clipboard','ok'); }\n    catch(e){ addLog('copy failed \\u2014 select from chat instead','er'); appendMsg(txt,'them'); }\n    hideInBanner();\n  }));\n  row.appendChild(bBtn('Dismiss','btn btn-sm',hideInBanner));\n  b.appendChild(t); b.appendChild(n); b.appendChild(row);\n  document.body.appendChild(b);\n}\nlet curSendOff=0, curSendTotal=0;\nlet totalData=0;\n\nfunction startSpeed(mode){\n  speedMode=mode||'send'; speedBytes=0; speedPrev=0; speedEMA=0; curMBs=0;\n  speedLast=Date.now(); xferActive=true;\n  if(speedTimer) clearInterval(speedTimer);\n  speedTimer = setInterval(tickSpeed, 250);\n  document.getElementById('sp-bar').classList.add('on');\n  document.getElementById('spd-ticker').classList.add('on');\n}\n\nfunction stopSpeed(){\n  if(speedTimer){ clearInterval(speedTimer); speedTimer=null; }\n  curMBs=0; xferActive=false;\n  setSpd(0);\n  document.getElementById('sp-bar').classList.remove('on');\n  document.getElementById('eta-v').textContent='\u2014';\n  setTimeout(()=>document.getElementById('spd-ticker').classList.remove('on'), 1800);\n}\n\nfunction tickSpeed(){\n  let done=0, total=0;\n  if(speedMode==='recv'){\n    done = curRecv ? curRecv.got : speedPrev;\n    total = curRecv ? curRecv.size : 0;\n    if(curRecv&&curRecv.size>0){\n      const f=document.getElementById('rc-fill'), p=document.getElementById('rc-pct');\n      const pct=Math.round(curRecv.got/curRecv.size*100);\n      if(f) f.style.width=pct+'%';\n      if(p) p.textContent=pct+'%';\n    }\n  } else {\n    const buf = (conn && conn.dataChannel) ? conn.dataChannel.bufferedAmount : 0;\n    done = Math.max(0, curSendOff - buf);\n    total = curSendTotal;\n  }\n  if(done < speedPrev) speedPrev = done;\n  const now=Date.now(), dt=(now-speedLast)/1000;\n  if(dt>0){\n    const inst = ((done-speedPrev)/dt)/(1024*1024);\n    speedEMA = speedEMA>0 ? speedEMA*0.6 + inst*0.4 : inst;\n    curMBs = speedEMA<0 ? 0 : speedEMA;\n  }\n  speedPrev=done; speedLast=now;\n  setSpd(curMBs);\n  if(curMBs>0.01 && total>0){\n    const rem=total-done;\n    const sec=rem/(curMBs*1024*1024);\n    document.getElementById('eta-v').textContent = sec<60 ? sec.toFixed(1)+'s' : (sec/60).toFixed(1)+'m';\n  }\n}\n\nfunction setSpd(v){\n  const s=v.toFixed(2);\n  const numEl=document.getElementById('sp-num');\n  const topEl=document.getElementById('spd-n');\n  numEl.textContent=s; topEl.textContent=s;\n  const col = v>8 ? '#16a34a' : v>3 ? '#0d9488' : '#2563eb';\n  numEl.style.color=col; topEl.style.color=col;\n}\n\n/* \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\n   PEERJS CORE\n\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550 */\nlet peer, conn;\nlet fileQueue=[], sending=false;\nlet curRecv=null;\nlet history=[], statS=0, statR=0;\n\nfunction genId(){ return String(Math.floor(100000+Math.random()*900000)); }\n\nasync function initPeer(){\n  if(peer){ return; } // guard against double-init\n  const TURN_WORKER='__TURN_WORKER_URL__';\n  let iceServers=[\n    {urls:'stun:stun.cloudflare.com:3478'},\n    {urls:'stun:stun.l.google.com:19302'}\n  ];\n  if(TURN_WORKER&&!TURN_WORKER.startsWith('__')){\n    try{\n      const r=await fetch(TURN_WORKER,{cache:'no-store'});\n      const d=await r.json();\n      if(d.iceServers){ iceServers=d.iceServers; addLog('TURN ready (Cloudflare)','ok'); }\n    }catch(e){\n      addLog('TURN fetch failed, using STUN + fallback TURN','er');\n      iceServers=[\n        {urls:'stun:stun.cloudflare.com:3478'},\n        {urls:'stun:stun.l.google.com:19302'},\n        {urls:'stun:stun1.l.google.com:19302'},\n        {urls:'stun:stun2.l.google.com:19302'},\n        {urls:'turn:freeturn.net:3478',username:'free',credential:'free'},\n        {urls:'turns:freeturn.net:5349',username:'free',credential:'free'},\n        {urls:'turn:openrelay.metered.ca:80',username:'openrelayproject',credential:'openrelayproject'},\n        {urls:'turn:openrelay.metered.ca:443',username:'openrelayproject',credential:'openrelayproject'},\n        {urls:'turn:openrelay.metered.ca:443?transport=tcp',username:'openrelayproject',credential:'openrelayproject'}\n      ];\n    }\n  } else {\n    iceServers=[\n      {urls:'stun:stun.cloudflare.com:3478'},\n      {urls:'stun:stun.l.google.com:19302'},\n      {urls:'stun:stun1.l.google.com:19302'},\n      {urls:'stun:stun2.l.google.com:19302'},\n      {urls:'turn:freeturn.net:3478',username:'free',credential:'free'},\n      {urls:'turns:freeturn.net:5349',username:'free',credential:'free'},\n      {urls:'turn:openrelay.metered.ca:80',username:'openrelayproject',credential:'openrelayproject'},\n      {urls:'turn:openrelay.metered.ca:443',username:'openrelayproject',credential:'openrelayproject'},\n      {urls:'turn:openrelay.metered.ca:443?transport=tcp',username:'openrelayproject',credential:'openrelayproject'}\n    ];\n  }\n  const myId=genId();\n  function makePeer(host,port,path){\n    return new Peer(myId,{host,port,path,secure:true,debug:0,\n      config:{iceServers,iceCandidatePoolSize:10,iceTransportPolicy:'all',bundlePolicy:'max-bundle'}});\n  }\n  peer=makePeer('0.peerjs.com',443,'/');\n  let _peerFallback=false;\n  peer.on('disconnected',()=>{ if(!_peerFallback){ try{peer.reconnect();}catch(e){} } });\n  peer.on('open',id=>{\n    const el=document.getElementById('my-id');\n    el.textContent=id; el.classList.remove('loading');\n    addLog('drop.me initialized','ok');\n    // Keepalive: reconnect to signaling server every 50s to prevent peer ID expiry\n    if(peer._keepalive) clearInterval(peer._keepalive);\n    peer._keepalive=setInterval(()=>{ try{ if(peer&&!peer.destroyed&&peer.disconnected) peer.reconnect(); }catch(e){} },50000);\n    const m=location.hash.match(/^#(\\d{6})$/);\n    if(m&&m[1]!==id){\n      document.getElementById('peer-id-input').value=m[1];\n      addLog('auto-connecting to '+m[1]+' (from QR link)','inf');\n      connectToPeer();\n      history.replaceState(null,'',location.pathname+location.search);\n    }\n  });\n  peer.on('connection',c=>{ if(c.label==='drop-bulk'){ wireBulk(c); } else { conn=c; wire(); addLog('incoming from '+c.peer,'inf'); } });\n  peer.on('error',e=>{\n    if(e.type==='peer-unavailable'){\n      addLog('peer not found \u2014 ask them to refresh and share their ID again','er');\n      cancelReconnect();\n      setBadge('disconnected','err');\n      const cb=document.getElementById('connect-btn');\n      if(cb){ cb.textContent='Connect \u2192'; cb.classList.remove('connected'); }\n      document.getElementById('peer-id-input').disabled=false;\n    } else if(e.type==='network'||e.type==='server-error'||e.type==='socket-error'){\n      addLog('signaling error ('+e.type+') \u2014 retrying\u2026','er');\n      setBadge('error','err');\n      setTimeout(()=>{ try{ if(peer&&!peer.destroyed) peer.reconnect(); }catch(ex){} },3000);\n    } else {\n      addLog('error ['+e.type+']: '+e.message,'er'); setBadge('error','err');\n    }\n  });\n}\n\nfunction connectToPeer(){\n  if(conn && conn.open) return;\n  cancelReconnect();\n  const id=document.getElementById('peer-id-input').value.trim();\n  if(!id||!peer) return;\n  conn=peer.connect(id,{reliable:true});\n  addLog('connecting to '+id+'\u2026','inf'); wire();\n}\n\nfunction onConnected(){\n  if(conn.__opened) return;\n  conn.__opened=true;\n  lastPeerId=conn.peer eduleReconnect();\n    const cb=document.getElementById('connect-btn');\n    if(cb){ cb.textContent='Connect \u2192'; cb.classList.remove('connected'); }\n    document.getElementById('peer-id-input').disabled=false;\n    document.getElementById('drop-zone').classList.add('off');\n    document.getElementById('chat-input').disabled=true;\n    document.getElementById('chat-send').disabled=true;\n    document.getElementById('chat-status').textContent='disconnected';\n    document.getElementById('send-btn').disabled=true;\n  });\n  conn.on('error', e=>{ addLog('conn: '+e.message,'er'); setBadge('error','err'); });\n}\n\nfunction handleChunkBuf(buf){\n  if(!curRecv||!buf) return;\n  if(!curRecv.hashSkip) curRecv.hp.push(crypto.subtle.digest('SHA-256',buf));\n  curRecv.got+=buf.byteLength||0;\n  if(curRecv.writer){\n    const w=curRecv.writer;\n    curRecv.wq=curRecv.wq.then(()=>w.write(buf));\n  } else {\n    curRecv.chunks.push(buf);\n  }\n  if(curRecv.pendingDone && curRecv.got>=curRecv.size){\n    const m=curRecv.pendingDone; curRecv.pendingDone=null;\n    finishDone(m);\n  }\n}\nfunction normBuf(d){\n  if(d instanceof ArrayBuffer) return d;\n  if(d&&d.buffer instanceof ArrayBuffer) return d.buffer.slice(d.byteOffset,d.byteOffset+d.byteLength);\n  return null;\n}\nfunction wireBulk(c){\n  dataConn=c;\n  c.on('data',d=>{ const b=normBuf(d); if(b) handleChunkBuf(b); });\n  c.on('close',()=>{ if(dataConn===c) dataConn=null; });\n  c.on('error',()=>{ if(dataConn===c) dataConn=null; });\n}\nfunction ensureFastLane(){\n  return new Promise(res=>{\n    if(dataConn&&dataConn.open) return res(true);\n    if(!conn||!conn.open||!peer) return res(false);\n    let c=null;\n    try{ c=peer.connect(conn.peer,{reliable:true,label:'drop-bulk',serialization:'raw'}); }\n    catch(e1){\n      try{ c=peer.connect(conn.peer,{reliable:true,label:'drop-bulk'}); }\n      catch(e2){ return res(false); }\n    }\n    const t=setTimeout(()=>{ try{c.close();}catch(e){} res(false); },4000);\n    c.on('open',()=>{ clearTimeout(t); wireBulk(c); res(true); });\n    c.on('error',()=>{ clearTimeout(t); res(false); });\n  });\n}\nasync function finishDone(msg){\n  if(!curRecv) return;\n  const r=curRecv; curRecv=null;\n  stopSpeed();\n  delete partialMap[r.fp];\n  idbDel(r.fp);\n  hideInBanner();\n  const elapsed=((Date.now()-r.t)/1000).toFixed(1);\n  if(r.writer){\n    try{\n      await r.wq;\n      await r.writer.close();\n      addLog('saved to disk: '+r.name+' in '+elapsed+'s','ok');\n    }catch(e){ addLog('disk write failed: '+e.message,'er'); return; }\n  } else {\n    const blob=new Blob(r.chunks);\n    saveFile(blob,r.name);\n    addLog('received '+r.name+' in '+elapsed+'s','ok');\n  }\n  if(msg.hash && !r.hashSkip){\n    try{\n      const hs=await Promise.all(r.hp);\n      const cat=new Uint8Array(hs.length*32);\n      hs.forEach((h,i)=>cat.set(new Uint8Array(h),i*32));\n      const mine=await sha256hex(cat.buffer);\n      if(mine===msg.hash) addLog('\\u2713 integrity verified \\u00b7 sha-256 '+mine.slice(0,12)+'\\u2026','ok');\n      else addLog('\\u26a0 HASH MISMATCH \\u2014 file may be corrupted, consider resending','er');\n    }catch(e){}\n  } else if(r.hashSkip){\n    addLog('integrity: resumed transfer \\u2014 boundary verified only','inf');\n  }\n  finishRecvCard(true,'\\u2713');\n  notifyDone('received '+r.name);\n  addHist(r.name,r.size,'recv',elapsed);\n  statR++; document.getElementById('stat-recv').textContent=statR;\n  totalData+=r.size; document.getElementById('stat-data').textContent=fmt(totalData);\n}\nasync function onData(data){\n  if(data && data.type==='chunk'){\n    handleChunkBuf(normBuf(data.buf));\n    return;\n  }\n  const msg=data;\n  if(msg.type==='hello'){\n    conn.peerNick=msg.name||null;\n    if(msg.name){\n      addLog('peer device: '+msg.name,'inf');\n      document.getElementById('chat-status').textContent=msg.name+' \\u00b7 online';\n      saveRecent(conn.peer,msg.name);\n    }\n    return;\n  }\n  if(msg.type==='drop-text'){\n    addLog('received text snippet ('+(msg.text||'').length+' chars)','inf');\n    showTextRecvBanner(msg.text||'');\n    return;\n  }\n  if(msg.type==='chat'){ appendMsg(msg.text,'them'); return; }\n  if(msg.type==='ready'){\n    if(sendGate){ const g=sendGate; sendGate=null; g({ok:true,offset:0}); }\n    return;\n  }\n  if(msg.type==='resume'){\n    if(sendGate){ const g=sendGate; sendGate=null; g({ok:true,offset:msg.offset||0,tailHash:msg.tailHash,tailLen:msg.tailLen}); }\n    return;\n  }\n  if(msg.type==='decline'){\n    curSendAbort=true;\n    if(sendGate){ const g=sendGate; sendGate=null; g({ok:false}); }\n    return;\n  }\n  if(msg.type==='begin'){\n    if(!curRecv) return;\n    if(msg.offset!==curRecv.got){\n      curRecv.got=msg.offset||0;\n      curRecv.hp=[];\n      curRecv.hashSkip=(curRecv.got>0);\n      if(curRecv.writer){\n        const w=curRecv.writer, o=curRecv.got;\n        curRecv.wq=curRecv.wq.then(()=>w.truncate(o)).then(()=>w.seek(o));\n      } else {\n        curRecv.chunks=[];\n      }\n      if(msg.offset===0) addLog('peer restarted transfer from 0%','er');\n    }\n    if(curRecv.got>0) addLog('resuming at '+Math.round(curRecv.got/curRecv.size*100)+'%','ok');\n    return;\n  }\n  if(msg.type==='meta'){\n    const fp=msg.fp||(msg.name+'|'+msg.size);\n    if(partialMap[fp] && partialMap[fp].size!==msg.size){ delete partialMap[fp]; idbDel(fp); }\n    curRecv={name:msg.name,size:msg.size,fp:fp,chunks:[],got:0,t:Date.now(),writer:null,wq:null,handle:null,hp:[],hashSkip:false};\n    addLog('receiving: '+msg.name+' ('+fmt(msg.size)+')','inf');\n    startSpeed('recv');\n    showRecvCard(msg.name,msg.size);\n    let rec=partialMap[fp];\n    if(!rec && window.showSaveFilePicker) rec=await idbGet(fp);\n    if(rec && rec.got>0 && rec.got<msg.size){\n      if(rec.auto){\n        addLog('auto-resuming from '+Math.round(rec.got/msg.size*100)+'%','ok');\n        resumeIncoming(rec);\n        return;\n      }\n      showResumeBanner(msg.name,msg.size,rec);\n      return;\n    }\n    if(rec && rec.got>=msg.size){\n      delete partialMap[fp]; idbDel(fp);\n    }\n    if(msg.size>=STREAM_MIN && window.showSaveFilePicker){\n      showInBanner(msg.name,msg.size);\n    } else {\n      if(msg.size>=1.5*1024*1024*1024 && !window.showSaveFilePicker)\n        addLog('warning: very large file on this browser may run out of memory','er');\n      conn.send({type:'ready'});\n    }\n    return;\n  }\n  if(msg.type==='done'){\n    if(!curRecv) return;\n    if(curRecv.got<curRecv.size){\n      curRecv.pendingDone=msg;\n      setTimeout(()=>{\n        if(curRecv&&curRecv.pendingDone===msg){\n          curRecv.pendingDone=null;\n          addLog('transfer incomplete \\u2014 missing '+fmt(curRecv.size-curRecv.got),'er');\n          finishRecvCard(false,'incomplete');\n          curRecv=null; stopSpeed();\n        }\n      },20000);\n      return;\n    }\n    finishDone(msg);\n  }\n}\n\nfunction bannerShell(){\n  hideInBanner();\n  const b=document.createElement('div'); b.className='in-banner'; b.id='in-banner';\n  return b;\n}\nfunction bRow(){ const r=document.createElement('div'); r.className='ib-row'; return r; }\nfunction bBtn(label,cls,fn){ const x=document.createElement('button'); x.className=cls; x.textContent=label; x.onclick=fn; return x; }\n\nfunction showInBanner(name,size){\n  const b=bannerShell();\n  const t=document.createElement('div'); t.className='ib-t'; t.textContent='incoming file';\n  const n=document.createElement('div'); n.className='ib-n'; n.textContent=name+'  ('+fmt(size)+')';\n  const row=bRow();\n  row.appendChild(bBtn('Accept & save\\u2026','btn btn-p',acceptIncoming));\n  row.appendChild(bBtn('Decline','btn btn-sm',declineIncoming));\n  b.appendChild(t); b.appendChild(n); b.appendChild(row);\n  document.body.appendChild(b);\n}\nfunction showResumeBanner(name,size,rec){\n  const b=bannerShell();\n  const t=document.createElement('div'); t.className='ib-t'; t.textContent='resume transfer';\n  const n=document.createElement('div'); n.className='ib-n';\n  n.textContent=name+'  \\u2014 '+Math.round(rec.got/size*100)+'% already received';\n  const row=bRow();\n  row.appendChild(bBtn('Resume','btn btn-p',()=>resumeIncoming(rec)));\n  row.appendChild(bBtn('Restart','btn btn-sm',()=>{ delete partialMap[curRecv.fp]; idbDel(curRecv.fp); if(curRecv.size>=STREAM_MIN&&window.showSaveFilePicker){ showInBanner(curRecv.name,curRecv.size); } else { hideInBanner(); conn.send({type:'ready'}); } }));\n  row.appendChild(bBtn('Decline','btn btn-sm',declineIncoming));\n  b.appendChild(t); b.appendChild(n); b.appendChild(row);\n  document.body.appendChild(b);\n}\nfunction hideInBanner(){\n  const b=document.getElementById('in-banner');\n  if(b) b.remove();\n}\nasync function acceptIncoming(){\n  if(!curRecv){ hideInBanner(); return; }\n  askNotify();\n  try{\n    const h=await window.showSaveFilePicker({suggestedName:curRecv.name});\n    const w=await h.createWritable();\n    curRecv.handle=h;\n    curRecv.writer=w;\n    curRecv.wq=Promise.resolve();\n    for(const c of curRecv.chunks){ curRecv.wq=curRecv.wq.then(()=>w.write(c)); }\n    curRecv.chunks=[];\n    hideInBanner();\n    conn.send({type:'ready'});\n    addLog('streaming to disk: '+curRecv.name,'ok');\n  }catch(e){\n    declineIncoming();\n  }\n}\nasync function resumeIncoming(rec){\n  if(!curRecv){ hideInBanner(); return; }\n  try{\n    if(rec.mode==='mem'){\n      curRecv.chunks=rec.chunks||[];\n      curRecv.got=rec.got;\n      curRecv.hashSkip=true;\n      const tail=await new Blob(curRecv.chunks).slice(Math.max(0,rec.got-TAIL),rec.got).arrayBuffer();\n      const th=await sha256hex(tail);\n      hideInBanner();\n      conn.send({type:'resume',offset:rec.got,tailHash:th,tailLen:tail.byteLength});\n      addLog('requesting resume from '+Math.round(rec.got/curRecv.size*100)+'%','inf');\n      return;\n    }\n    let h=rec.handle;\n    let perm='denied';\n    if(h&&h.queryPermission){\n      perm=await h.queryPermission({mode:'readwrite'});\n      if(perm!=='granted'&&h.requestPermission) perm=await h.requestPermission({mode:'readwrite'});\n    } else if(h){ perm='granted'; }\n    if(perm!=='granted'){\n      h=await window.showSaveFilePicker({suggestedName:curRecv.name});\n    }\n    const f=await h.getFile();\n    let off=Math.min(rec.got,f.size);\n    off=Math.floor(off/CHUNK)*CHUNK;\n    const tail=await f.slice(Math.max(0,off-TAIL),off).arrayBuffer();\n    const th=await sha256hex(tail);\n    const w=await h.createWritable({keepExistingData:true});\n    await w.truncate(off);\n    await w.seek(off);\n    curRecv.handle=h;\n    curRecv.writer=w;\n    curRecv.wq=Promise.resolve();\n    curRecv.got=off;\n    curRecv.hashSkip=true;\n    hideInBanner();\n    conn.send({type:'resume',offset:off,tailHash:th,tailLen:tail.byteLength});\n    addLog('requesting resume from '+Math.round(off/curRecv.size*100)+'%','inf');\n  }catch(e){\n    addLog('resume setup failed: '+e.message,'er');\n    declineIncoming();\n  }\n}\nfunction declineIncoming(){\n  hideInBanner();\n  removeRecvCard();\n  if(conn&&conn.open) conn.send({type:'decline'});\n  if(curRecv) addLog('declined '+curRecv.name,'er');\n  curRecv=null;\n  stopSpeed();\n}\nasync function interruptTransfers(){\n  hideInBanner();\n  if(sending) wasInterruptedSend=true;\n  if(sendGate){ const g=sendGate; sendGate=null; g({ok:false}); }\n  curSendAbort=true;\n  if(curRecv){\n    const r=curRecv; curRecv=null;\n    stopSpeed();\n    if(r.got>0&&r.got<r.size){\n      if(r.writer){\n        try{\n          await r.wq;\n          await r.writer.close();\n          const rec={fp:r.fp,name:r.name,size:r.size,got:r.got,handle:r.handle};\n          idbSet(r.fp,Object.assign({},rec));\n          rec.auto=true;\n          partialMap[r.fp]=rec;\n          addLog('interrupted at '+Math.round(r.got/r.size*100)+'% \\u2014 reconnect & resend to resume','er');\n          finishRecvCard(false,'interrupted');\n        }catch(e){ addLog('could not save partial: '+e.message,'er'); }\n      } else {\n        partialMap[r.fp]={fp:r.fp,mode:'mem',chunks:r.chunks,got:r.got,name:r.name,size:r.size,auto:true};\n        finishRecvCard(false,'interrupted');\n        addLog('interrupted at '+Math.round(r.got/r.size*100)+'% \\u2014 reconnect & resend to resume','er');\n      }\n    }\n  }\n}\n\n\n\n\n\n\n/* \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\n   FILE QUEUE\n\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550 */\nfunction onFileSelect(e){ addFiles([...e.target.files]); e.target.value=''; }\nfunction onDragOver(e){ e.preventDefault(); document.getElementById('drop-zone').classList.add('over'); }\nfunction onDragLeave(){ document.getElementById('drop-zone').classList.remove('over'); }\nfunction onDrop(e){\n  e.preventDefault();\n  document.getElementById('drop-zone').classList.remove('over');\n  addFiles([...e.dataTransfer.files]);\n}\n\nfunction addFiles(files){\n  files.forEach(f=>{\n    const item={file:f, status:'pending', id:'q'+Date.now().toString(36)+Math.random().toString(36).slice(2)};\n    fileQueue.push(item); renderQI(item);\n  });\n  updSend();\n  document.getElementById('clear-btn').style.display=fileQueue.length?'':'none';\n}\n\nfunction renderQI(item){\n  const list=document.getElementById('queue-list');\n  const el=document.createElement('div');\n  el.className='qi'; el.id=item.id;\n  el.innerHTML=`\n    <div class=\"qi-ico\">${fmtEmoji(item.file.name)}<\u002Fdiv>\n    <div class=\"qi-inf\">\n      <div class=\"qi-nm\">${escH(item.file.name)}<\u002Fdiv>\n      <div class=\"qi-mt\">${fmt(item.file.size)}<\u002Fdiv>\n      <div class=\"qi-track\"><div class=\"qi-fill\" id=\"f_${item.id}\"><\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"qi-pct\" id=\"s_${item.id}\">queued<\u002Fdiv>\n    <button class=\"btn btn-sm\" onclick=\"rmQ('${item.id}')\" style=\"padding:.18rem .38rem;font-size:.62rem;flex-shrink:0\">\u2715<\u002Fbutton>\n  `;\n  list.appendChild(el);\n}\n\nfunction rmQ(id){\n  fileQueue=fileQueue.filter(i=>i.id!==id);\n  document.getElementById(id)?.remove();\n  updSend();\n  if(!fileQueue.length) document.getElementById('clear-btn').style.display='none';\n}\n\nfunction clearQueue(){\n  fileQueue=[];\n  document.getElementById('queue-list').innerHTML='';\n  document.getElementById('clear-btn').style.display='none';\n  updSend();\n}\n\nfunction updSend(){\n  const ok=conn&&conn.open&&fileQueue.filter(i=>i.status==='pending').length>0&&!sending;\n  document.getElementById('send-btn').disabled=!ok;\n}\n\nasync function startQueue(){\n  if(sending) return;\n  sending=true; updSend(); startSpeed('send'); askNotify();\n  for(const item of fileQueue){\n    if(item.status!=='pending') continue;\n    if(!conn||!conn.open) break;\n    await sendQI(item);\n  }\n  sending=false; stopSpeed(); updSend();\n}\n\nfunction sendQI(item){\n  return new Promise(async (resolve)=>{\n   try{\n    item.status='sending';\n    const el=document.getElementById(item.id);\n    if(el) el.classList.add('on');\n    setQS(item.id,'0%');\n    const fillEl=document.getElementById('f_'+item.id);\n    const t0=Date.now();\n    addLog('sending '+item.file.name+'\u2026','inf');\n    const fast=await ensureFastLane();\n    if(fast) addLog('fast lane active \\u00b7 dedicated data channel','inf');\n    conn.send({type:'meta',name:item.file.name,size:item.file.size,fp:item.file.name+'|'+item.file.size+'|'+(item.file.lastModified||0)});\n    const lane=fast?dataConn:conn;\n    const dc=lane.dataChannel||lane._dc||null;\n    const HIGH=4*1024*1024, LOW=512*1024;\n    if(dc&&dc.bufferedAmountLowThreshold!==undefined) dc.bufferedAmountLowThreshold=LOW;\n    curSendOff=0; curSendTotal=item.file.size;\n    curSendAbort=false;\n    const g=await new Promise(res=>{\n      sendGate=res;\n      setTimeout(()=>{ if(sendGate===res){ sendGate=null; res({ok:true,offset:0}); } },8000);\n    });\n    sendGate=null;\n    if(!g.ok) throw new Error('declined by peer');\n    let startOff=0;\n    if(g.offset>0 && g.offset<=item.file.size){\n      let match=true;\n      if(g.tailHash && g.tailLen){\n        const tail=await item.file.slice(g.offset-g.tailLen,g.offset).arrayBuffer();\n        match=(await sha256hex(tail))===g.tailHash;\n      }\n      if(match){\n        startOff=g.offset;\n        addLog('resuming '+item.file.name+' from '+Math.round(startOff/item.file.size*100)+'%','ok');\n      } else {\n        addLog('resume verification failed \\u2014 restarting from 0%','er');\n      }\n    }\n    conn.send({type:'begin',offset:startOff});\n    const doHash=(startOff===0);\n    const chunkHashes=[];\n    let off=startOff, lastUI=0;\n    let readNext=off<item.file.size?item.file.slice(off,off+CHUNK).arrayBuffer():null;\n    while(off<item.file.size){\n      if(curSendAbort) throw new Error('cancelled by peer');\n      if(dc && typeof dc.bufferedAmount==='number' && dc.bufferedAmount>HIGH){\n        await new Promise(r=>{\n          if(dc.bufferedAmountLowThreshold!==undefined){\n            dc.addEventListener('bufferedamountlow',r,{once:true});\n          } else {\n            setTimeout(r,50);\n          }\n        });\n      } else if(!dc){\n        await new Promise(r=>setTimeout(r,1));\n      }\n      const chunk=await readNext;\n      if(doHash) chunkHashes.push(crypto.subtle.digest('SHA-256',chunk));\n      off+=chunk.byteLength;\n      readNext=off<item.file.size?item.file.slice(off,off+CHUNK).arrayBuffer():null;\n      if(fast&&dataConn&&dataConn.open){ dataConn.send(chunk); } else { conn.send({type:'chunk',buf:chunk}); }\n      curSendOff=off; speedBytes+=chunk.byteLength;\n      const now=Date.now();\n      if(now-lastUI>100){\n        const pct=Math.round(off/item.file.size*100);\n        if(fillEl) fillEl.style.width=pct+'%';\n        setQS(item.id,pct+'%');\n        lastUI=now;\n      }\n    }\n    let rootHex=null;\n    if(doHash){\n      try{\n        const hs=await Promise.all(chunkHashes);\n        const cat=new Uint8Array(hs.length*32);\n        hs.forEach((h,i)=>cat.set(new Uint8Array(h),i*32));\n        rootHex=await sha256hex(cat.buffer);\n      }catch(e){}\n    }\n    conn.send({type:'done',hash:rootHex});\n    const elapsed=((Date.now()-t0)/1000).toFixed(1);\n    item.status='done';\n    if(el){ el.classList.remove('on'); el.classList.add('done'); }\n    setQS(item.id,'\u2713','ok');\n    if(fillEl) fillEl.style.width='100%';\n    addLog('sent '+item.file.name+' in '+elapsed+'s','ok');\n    addHist(item.file.name,item.file.size,'sent',elapsed);\n    notifyDone('sent '+item.file.name);\n    totalData+=item.file.size;\n    document.getElementById('stat-data').textContent=fmt(totalData);\n    statS++; document.getElementById('stat-sent').textContent=statS;\n    resolve();\n   }catch(e){\n     addLog('send failed: '+e.message,'er');\n     item.status='pending';\n     const el2=document.getElementById(item.id);\n     if(el2) el2.classList.remove('on');\n     setQS(item.id,'retry','er');\n     resolve();\n   }\n  });\n}\n\nfunction setQS(id,txt,cls=''){\n  const el=document.getElementById('s_'+id);\n  if(el){ el.textContent=txt; el.className='qi-pct '+cls; }\n}\n\n/* \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\n   CHAT\n\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550 */\nfunction onChatKey(e){ if(e.key==='Enter') sendChat(); }\nfunction sendChat(){\n  const inp=document.getElementById('chat-input');\n  const txt=inp.value.trim();\n  if(!txt||!conn?.open) return;\n  conn.send({type:'chat',text:txt}); appendMsg(txt,'me'); inp.value='';\n}\nfunction appendMsg(text,side){\n  const box=document.getElementById('chat-messages');\n  box.querySelector('.cempty')?.remove();\n  const now=new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});\n  const m=document.createElement('div'); m.className='msg '+side;\n  m.innerHTML=`<div class=\"bubble\">${escH(text)}<\u002Fdiv><div class=\"mtime\">${now}<\u002Fdiv>`;\n  box.appendChild(m); box.scrollTop=box.scrollHeight;\n}\n\n/* \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\n   HISTORY\n\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550 */\nfunction addHist(name,size,dir,elapsed){\n  history.unshift({name,size,dir,elapsed,t:new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})});\n  renderHist();\n}\nfunction renderHist(){\n  const list=document.getElementById('history-list');\n  if(!history.length){ list.innerHTML='<div class=\"hempty\">No transfers yet<\u002Fdiv>'; return; }\n  list.innerHTML=history.map(h=>`\n    <div class=\"hi\">\n      <div style=\"font-size:.95rem;flex-shrink:0\">${fmtEmoji(h.name)}<\u002Fdiv>\n      <div class=\"hi-i\">\n        <div class=\"hi-n\">${escH(h.name)}<\u002Fdiv>\n        <div class=\"hi-m\">${fmt(h.size)} \u00b7 ${h.elapsed}s \u00b7 ${h.t}<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"hbadge ${h.dir==='sent'?'s':'r'}\">${h.dir==='sent'?'\u2191 sent':'\u2193 recv'}<\u002Fdiv>\n    <\u002Fdiv>\n  `).join('');\n}\nfunction clearHistory(){\n  history=[]; statS=0; statR=0; totalData=0;\n  document.getElementById('stat-sent').textContent='0';\n  document.getElementById('stat-recv').textContent='0';\n  document.getElementById('stat-data').textContent='0 B';\n  renderHist();\n}\n\n/* \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\n   UTILS\n\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550 */\nfunction addLog(msg,type=''){\n  const el=document.getElementById('log');\n  const d=document.createElement('span');\n  d.className=type; d.textContent='\u00bb '+msg+'\\n';\n  el.appendChild(d); el.scrollTop=el.scrollHeight;\n}\nfunction setBadge(text,cls=''){\n  document.getElementById('status-badge').className='badge '+cls;\n  document.getElementById('status-text').textContent=text;\n}\nfunction copyId(){\n  const id=document.getElementById('my-id').textContent;\n  if(id.includes('\u2026')) return;\n  navigator.clipboard.writeText(id).then(()=>{\n    const b=document.getElementById('copy-btn');\n    b.textContent='Copied!'; setTimeout(()=>b.textContent='Copy',1500);\n  });\n}\nfunction fmt(b){\n  if(b<1024) return b+' B';\n  if(b<1048576) return (b/1024).toFixed(1)+' KB';\n  if(b<1073741824) return (b/1048576).toFixed(1)+' MB';\n  return (b/1073741824).toFixed(2)+' GB';\n}\nfunction fmtEmoji(n){\n  const e=n.split('.').pop().toLowerCase();\n  const m={pdf:'\ud83d\udcc4',doc:'\ud83d\udcdd',docx:'\ud83d\udcdd',xls:'\ud83d\udcca',xlsx:'\ud83d\udcca',ppt:'\ud83d\udcd1',pptx:'\ud83d\udcd1',\n    jpg:'\ud83d\uddbc\ufe0f',jpeg:'\ud83d\uddbc\ufe0f',png:'\ud83d\uddbc\ufe0f',gif:'\ud83d\uddbc\ufe0f',svg:'\ud83d\uddbc\ufe0f',webp:'\ud83d\uddbc\ufe0f',\n    mp4:'\ud83c\udfac',mov:'\ud83c\udfac',avi:'\ud83c\udfac',mkv:'\ud83c\udfac',mp3:'\ud83c\udfb5',wav:'\ud83c\udfb5',flac:'\ud83c\udfb5',\n    zip:'\ud83d\udddc\ufe0f',rar:'\ud83d\udddc\ufe0f',gz:'\ud83d\udddc\ufe0f',tar:'\ud83d\udddc\ufe0f',py:'\ud83d\udc0d',js:'\ud83d\udcdc',ts:'\ud83d\udcdc',\n    html:'\ud83c\udf10',css:'\ud83c\udfa8',json:'\ud83d\udccb',csv:'\ud83d\udccb',txt:'\ud83d\udcc3'};\n  return m[e]||'\ud83d\udcc1';\n}\nfunction escH(s){ return s.replace(/&/g,'&amp;').replace(/<\u002Fg,'&lt;').replace(/>/g,'&gt;'); }\n\nasync function saveFile(blob,name){try{if(window.Capacitor&&window.Capacitor.Plugins&&window.Capacitor.Plugins.Filesystem){const FS=window.Capacitor.Plugins.Filesystem;const b64=await blobToBase64(blob);const res=await FS.writeFile({path:name,data:b64,directory:'DOCUMENTS',recursive:true});addLog('saved to device: '+name,'ok');return res.uri;}const u=URL.createObjectURL(blob);const a=document.createElement('a');a.href=u;a.download=name;a.click();URL.revokeObjectURL(u);}catch(e){addLog('save failed: '+e.message,'er');}}function blobToBase64(blob){return new Promise(function(resolve,reject){var r=new FileReader();r.onloadend=function(){resolve(String(r.result).split(',')[1]);};r.onerror=reject;r.readAsDataURL(blob);});}(function w(n){ if(window.Peer){ if(typeof peer!==\"undefined\"&&peer&&!peer.destroyed){ try{peer.destroy();}catch(ex){} peer=null; } initPeer().catch(e=>addLog(\"startup error: \"+e.message,\"er\")); } else if(n>0){ setTimeout(function(){ w(n-1); },100); } else { addLog('failed to load PeerJS - check connection','er'); } })(50);\n(function(){\n  const ni=document.getElementById('nick-input');\n  if(ni){\n    ni.value=lsGet('nick')||'';\n    ni.addEventListener('input',()=>lsSet('nick',ni.value.trim()));\n  }\n  renderRecent();\n  document.addEventListener('paste',e=>{\n    const ae=document.activeElement;\n    if(ae&&(ae.tagName==='INPUT'||ae.tagName==='TEXTAREA'||ae.isContentEditable)) return;\n    if(!e.clipboardData) return;\n    const files=[...(e.clipboardData.files||[])];\n    if(files.length){\n      addFiles(files);\n      addLog('added '+files.length+' pasted file(s) to queue','inf');\n      return;\n    }\n    const txt=e.clipboardData.getData('text');\n    if(txt&&conn&&conn.open) showTextDropBanner(txt);\n  });\n})();\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"</script>
